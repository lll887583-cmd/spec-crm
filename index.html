<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPEC Interactive UI Demo</title>
    <style>
      :root {
        --primary: #1f3472;
        --secondary: #1c1a19;
        --text: #1d1d1d;
        --muted: #777777;
        --pale: #5d647d;
        --line: #dbdbdb;
        --line-soft: #edeff4;
        --body-bg: #f9fafb;
        --white: #ffffff;
        --success: #24a661;
        --warning: #ffae57;
        --error: #a1261f;
        --danger: #ff4d4f;
        --nav-hover: #f9fafb;
        --nav-active: #f9fafb;
        --column-head: #f8faff;
        --shadow-card: none;
        --shadow-popup: 0 6px 16px 0 rgba(31, 52, 114, 0.06),
          0 3px 6px -4px rgba(31, 52, 114, 0.08),
          0 9px 28px 8px rgba(31, 52, 114, 0.035);
        --dropdown-radius: 4px;
        --dropdown-hover: #f2f3f5;
        --dropdown-shadow: 0 0 7px 0 rgba(0, 0, 0, 0.1);
        --dropdown-item-min-h: 40px;
        --dropdown-item-padding: 10px 8px;
        --dropdown-text: #1d1d1d;
        --dropdown-muted: #666666;
        --dropdown-min-w: 110px;
        --dropdown-max-w: min(320px, calc(100vw - 32px));
        --topbar-h: 64px;
        --sidebar-w: 220px;
      }

      * { box-sizing: border-box; }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        background: var(--body-bg);
        color: var(--text);
        font-family: "ubuntu-font", "Ubuntu", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        min-height: 100vh;
        background: var(--body-bg);
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 120;
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: var(--topbar-h);
        padding: 0 24px;
        background: var(--white);
        border-bottom: 1px solid var(--line-soft);
      }

      .topbar-left,
      .topbar-right,
      .brand,
      .mode-control,
      .asset-summary,
      .topbar-icons,
      .user-box {
        display: flex;
        align-items: center;
      }

      .topbar-left {
        gap: 42px;
        min-width: 0;
      }

      .menu-trigger {
        display: none;
        place-items: center;
        width: 36px;
        height: 36px;
        border: 0;
        border-radius: 6px;
        background: var(--nav-hover);
        color: var(--primary);
      }

      .brand {
        gap: 10px;
        white-space: nowrap;
      }

      .brand-logo {
        display: block;
        width: 118px;
        height: auto;
        flex: 0 0 auto;
      }

      .mode-wrap {
        position: relative;
      }

      .mode-control {
        gap: 8px;
        min-height: 34px;
        padding: 7px 10px;
        border: 0;
        border-radius: 5px;
        background: transparent;
        color: var(--text);
        transition: background 0.18s ease, color 0.18s ease;
      }

      .mode-control:hover,
      .mode-control[aria-expanded="true"] {
        background: var(--nav-hover);
        color: var(--primary);
      }

      /* Dropdown component: independent from sidebar navigation states. */
      .mode-menu {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        z-index: 130;
        width: max-content;
        min-width: var(--dropdown-min-w);
        max-width: var(--dropdown-max-w);
        padding: 0;
        border: 1px solid var(--line-soft);
        border-radius: var(--dropdown-radius);
        background: var(--white);
        box-shadow: var(--dropdown-shadow);
        overflow: hidden;
        opacity: 0;
        transform: translateY(-4px);
        pointer-events: none;
        transition: opacity 0.16s ease, transform 0.16s ease;
      }

      .mode-menu.open {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .mode-option {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
        width: 100%;
        min-height: var(--dropdown-item-min-h);
        padding: var(--dropdown-item-padding);
        border: 0;
        border-radius: 0;
        background: transparent;
        color: var(--dropdown-text);
        font-size: 14px;
        font-weight: 400;
        line-height: 1.4;
        text-align: left;
        white-space: nowrap;
      }

      .mode-option span:empty {
        display: none;
      }

      .mode-option:hover,
      .mode-option.active {
        background: var(--dropdown-hover);
        color: var(--dropdown-text);
        font-weight: 400;
      }

      .topbar-right {
        justify-content: flex-end;
        gap: 18px;
        min-width: 0;
      }

      .asset-summary {
        gap: 12px;
        color: var(--success);
        white-space: nowrap;
      }

      .coin {
        display: inline-grid;
        place-items: center;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #ffd98f;
        color: #bd7412;
        font-size: 10px;
        font-weight: 700;
      }

      .valuation {
        display: flex;
        gap: 10px;
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      .valuation strong {
        color: #00a660;
      }

      .topbar-icons {
        gap: 16px;
        color: var(--primary);
      }

      .language-wrap {
        position: relative;
        flex: 0 0 auto;
      }

      .language-button {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-height: 34px;
        padding: 7px 10px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--primary);
        font-size: 13px;
        font-weight: 500;
        transition: background 0.18s ease, transform 0.18s ease;
      }

      .language-button:hover,
      .language-button[aria-expanded="true"] {
        background: var(--nav-hover);
        transform: translateY(-1px);
      }

      .language-menu {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        z-index: 135;
        width: max-content;
        min-width: var(--dropdown-min-w);
        max-width: var(--dropdown-max-w);
        padding: 0;
        border: 1px solid var(--line-soft);
        border-radius: var(--dropdown-radius);
        background: var(--white);
        box-shadow: var(--dropdown-shadow);
        overflow: hidden;
        opacity: 0;
        transform: translateY(-4px);
        pointer-events: none;
        transition: opacity 0.16s ease, transform 0.16s ease;
      }

      .language-menu.open {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .language-option {
        width: 100%;
        min-height: var(--dropdown-item-min-h);
        padding: var(--dropdown-item-padding);
        border: 0;
        border-radius: 0;
        background: transparent;
        color: var(--dropdown-text);
        font-size: 13px;
        font-weight: 400;
        text-align: left;
      }

      .language-option:hover,
      .language-option.active {
        background: var(--dropdown-hover);
        color: var(--dropdown-text);
        font-weight: 400;
      }

      .icon-button {
        position: relative;
        display: inline-grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: currentColor;
        transition: background 0.18s ease, transform 0.18s ease;
      }

      .icon-button:hover {
        background: var(--nav-hover);
        transform: translateY(-1px);
      }

      .icon-button svg {
        width: 24px;
        height: 24px;
      }

      .icon-button.has-dot::after {
        content: "";
        position: absolute;
        top: 7px;
        right: 7px;
        width: 7px;
        height: 7px;
        border: 2px solid var(--white);
        border-radius: 50%;
        background: #ff477e;
      }

      .topbar-divider {
        width: 1px;
        height: 28px;
        background: var(--line-soft);
      }

      .user-box {
        gap: 10px;
        min-width: 0;
      }

      .avatar {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: #cfe6ff;
        color: #4f93d0;
        flex: 0 0 auto;
      }

      .user-name {
        color: #333333;
        font-size: 13px;
        font-weight: 700;
        white-space: nowrap;
      }

      .user-status {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 2px;
        padding: 2px 8px;
        border-radius: 30px;
        background: #f6f6f6;
        color: var(--success);
        font-size: 10px;
        font-weight: 700;
      }

      .layout {
        display: flex;
        min-height: calc(100vh - var(--topbar-h));
      }

      .sidebar {
        position: sticky;
        top: var(--topbar-h);
        z-index: 55;
        width: var(--sidebar-w);
        height: calc(100vh - var(--topbar-h));
        flex: 0 0 var(--sidebar-w);
        overflow: visible;
        background: var(--white);
        border-right: 1px solid var(--line-soft);
        transition: width 0.2s ease, flex-basis 0.2s ease, transform 0.2s ease;
      }

      .app.sidebar-collapsed {
        --sidebar-w: 72px;
      }

      .nav-scroll {
        height: 100%;
        padding: 12px 0 64px;
        overflow-y: auto;
        scrollbar-width: none;
      }

      .nav-scroll::-webkit-scrollbar {
        width: 0;
        height: 0;
      }

      .scroll-touch {
        position: absolute;
        top: 64px;
        right: 0;
        bottom: 64px;
        width: 8px;
        opacity: 0;
        pointer-events: auto;
        transition: opacity 0.18s ease;
      }

      .scroll-thumb {
        position: absolute;
        top: 0;
        right: 2px;
        width: 4px;
        min-height: 36px;
        border-radius: 999px;
        background: rgba(63, 68, 78, 0.34);
        cursor: grab;
      }

      .scroll-thumb:active { cursor: grabbing; }

      .sidebar.show-scrollbar .scroll-touch,
      .scroll-touch:hover {
        opacity: 1;
      }

      .nav-group {
        margin-bottom: 4px;
      }

      .nav-section-title {
        margin: 14px 0 0;
        padding: 8px 0 8px 16px;
        border-top: 1px solid var(--line-soft);
        color: #777777;
        font-size: 13px;
        font-weight: 400;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        min-height: 38px;
        padding: 10px 16px;
        border: 0;
        border-radius: 3px;
        background: transparent;
        color: #333333;
        font-size: 16px;
        font-weight: 400;
        text-align: left;
        transition: background 0.16s ease, color 0.16s ease;
      }

      .nav-item:hover {
        background: var(--nav-hover);
        font-weight: 400;
      }

      .nav-item.active {
        background: var(--nav-active);
        color: var(--primary);
        font-weight: 500;
      }

      .nav-icon,
      .nav-item > svg {
        display: block;
        width: 24px;
        height: 24px;
        margin-top: 0;
        color: currentColor;
        flex: 0 0 24px;
        opacity: 0.76;
      }

      .nav-text {
        flex: 1 1 auto;
        min-width: 0;
        max-width: 140px;
        overflow: visible;
        white-space: normal;
        overflow-wrap: anywhere;
        word-break: normal;
        font-weight: 400;
        line-height: 20px;
      }

      .nav-item.active .nav-text {
        font-weight: 500;
      }

      .nav-caret {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 14px;
        flex: 0 0 auto;
        margin-top: 0;
        color: #7d8798;
        font-size: 13px;
        transition: transform 0.18s ease;
      }

      .nav-caret-placeholder {
        visibility: hidden;
        transform: none !important;
      }

      .nav-group.collapsed .nav-caret {
        transform: rotate(180deg);
      }

      .nav-badge {
        display: inline-grid;
        place-items: center;
        flex: 0 0 auto;
        min-width: 17px;
        height: 17px;
        margin-top: 0;
        padding: 0 5px;
        border-radius: 999px;
        background: #df3731;
        color: var(--white);
        font-size: 9px;
        font-weight: 700;
        line-height: 1;
      }

      .sub-nav {
        display: grid;
        gap: 2px;
        margin: 2px 0 7px;
        overflow: visible;
        transition: opacity 0.18s ease;
      }

      .nav-group.collapsed .sub-nav {
        max-height: 0 !important;
        overflow: hidden;
        opacity: 0;
      }

      .sub-nav .nav-item {
        min-height: 34px;
        padding-left: 50px;
        color: #666666;
        font-size: 14px;
      }

      .sub-nav .nav-item:hover {
        color: #666666;
      }

      .sub-nav .nav-item.active {
        color: var(--primary);
      }

      .collapse-bar {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        display: grid;
        place-items: center;
        height: 52px;
        border-top: 1px solid var(--line-soft);
        background: var(--white);
      }

      .collapse-button {
        display: grid;
        place-items: center;
        width: 32px;
        height: 32px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: #8d8d8d;
        transition: background 0.18s ease, color 0.18s ease;
      }

      .collapse-button:hover {
        background: var(--nav-hover);
        color: var(--primary);
      }

      .collapse-icon {
        display: block;
        width: 16px;
        height: 16px;
      }

      .collapse-icon-expand {
        display: none;
      }

      .sidebar-collapsed .collapse-icon-collapse {
        display: none;
      }

      .sidebar-collapsed .collapse-icon-expand {
        display: block;
      }

      .sidebar-collapsed .nav-scroll {
        padding: 12px 0 64px !important;
      }

      .sidebar-collapsed .nav-item {
        position: relative;
        display: grid;
        place-items: center;
        padding: 10px 8px;
        min-height: 42px;
      }

      @media (min-width: 901px) {
        .sidebar-collapsed .nav-item.parent-active {
          background: var(--nav-active);
          color: var(--primary);
          font-weight: 500;
        }

        .sidebar-collapsed .nav-item.parent-active .nav-icon,
        .sidebar-collapsed .nav-item.parent-active > svg {
          opacity: 1;
        }
      }

      .sidebar-collapsed .nav-section-title,
      .sidebar-collapsed .nav-text,
      .sidebar-collapsed .nav-caret,
      .sidebar-collapsed .sub-nav {
        display: none;
      }

      .sidebar-collapsed .nav-scroll .nav-item > .nav-badge {
        position: absolute;
        top: 6px;
        right: 8px;
        display: inline-grid;
        margin: 0;
      }

      .sidebar-flyout {
        position: fixed;
        z-index: 1000;
        display: grid;
        gap: 0;
        width: max-content;
        min-width: 110px;
        max-width: min(280px, calc(100vw - 32px));
        max-height: calc(100vh - 24px);
        padding: 0;
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        background: var(--white);
        box-shadow: var(--shadow-popup);
        overflow-y: auto;
        overscroll-behavior: contain;
        scrollbar-width: thin;
        scrollbar-color: rgba(63, 68, 78, 0.28) transparent;
        opacity: 0;
        transform: translateX(-6px);
        pointer-events: none;
        transition: opacity 0.16s ease, transform 0.16s ease;
      }

      .sidebar-flyout.open {
        opacity: 1;
        transform: translateX(0);
        pointer-events: auto;
      }

      .sidebar-flyout-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        column-gap: 16px;
        width: 100%;
        min-width: 100%;
        min-height: 40px;
        padding: 10px 16px;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: #666666;
        font-weight: 400;
        text-align: left;
        transition: background 0.16s ease, color 0.16s ease;
      }

      .sidebar-flyout-item:hover {
        background: var(--nav-active);
        color: #666666;
        font-weight: 400;
      }

      .sidebar-flyout-item.active {
        background: var(--nav-active);
        color: var(--primary);
        font-weight: 500;
      }

      .sidebar-flyout-label {
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        font-size: 14px;
        font-weight: 400;
        line-height: 18px;
      }

      .sidebar-flyout-item > .nav-badge {
        justify-self: end;
        margin: 0;
      }

      .sidebar-flyout-item.active .sidebar-flyout-label {
        font-weight: 500;
      }

      .content {
        flex: 1;
        min-width: 0;
        padding: 28px 32px 32px;
      }

      .content-shell {
        width: min(100%, 1480px);
      }

      .app.sidebar-collapsed .content-shell {
        margin-inline: auto;
      }

      .page-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .headline {
        margin: 0;
        color: #333333;
        font-size: 26px;
        line-height: 1.25;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .page-subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 36px;
        padding: 8px 16px;
        border: 1px solid var(--primary);
        border-radius: 4px;
        background: var(--primary);
        color: var(--white);
        font-weight: 500;
        transition: background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
      }

      .btn:hover {
        box-shadow: 0 3px 6px 0 rgba(31, 52, 114, 0.22);
        transform: translateY(-1px);
      }

      .btn.secondary {
        background: var(--white);
        color: var(--primary);
      }

      .tabs {
        display: flex;
        align-items: center;
        gap: 26px;
        margin: 0 0 28px;
        overflow-x: auto;
      }

      .tab {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 32px;
        padding: 0 18px;
        border: 0;
        border-bottom: 2px solid var(--line-soft);
        background: transparent;
        color: #9a9a9a;
        white-space: nowrap;
        font-size: 16px;
        font-weight: 400;
        transition: color 0.16s ease, border-color 0.16s ease, font-weight 0.16s ease;
      }

      .tab:hover,
      .tab.active {
        color: var(--primary);
        border-bottom-color: var(--primary);
      }

      .tab.active {
        font-weight: 700;
      }

      .card {
        background: var(--white);
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        box-shadow: var(--shadow-card);
      }

      .filter-card {
        display: grid;
        grid-template-columns: repeat(4, minmax(150px, 1fr)) auto;
        gap: 14px;
        align-items: end;
        padding: 18px;
        margin-bottom: 24px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        color: #666666;
        font-size: 12px;
      }

      .field input,
      .field select {
        width: 100%;
        min-height: 38px;
        min-width: 0;
        padding: 8px 12px;
        border: 1px solid var(--line-soft);
        border-radius: 4px;
        background: #fbfbfb;
        color: var(--text);
        font-weight: 400;
        outline: none;
        transition: border-color 0.18s ease, box-shadow 0.18s ease;
      }

      .field input::placeholder {
        color: var(--muted);
        font-weight: 400;
      }

      .field input:focus,
      .field select:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(31, 52, 114, 0.08);
      }

      .filter-select {
        position: relative;
        min-width: 0;
      }

      .filter-select-control {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        width: 100%;
        min-height: 38px;
        min-width: 0;
        padding: 8px 12px;
        border: 1px solid var(--line-soft);
        border-radius: 4px;
        background: #fbfbfb;
        color: var(--text);
        font-size: 14px;
        font-weight: 500;
        line-height: 1.4;
        text-align: left;
        transition: border-color 0.18s ease, box-shadow 0.18s ease;
      }

      .filter-select-control::after {
        content: "";
        width: 7px;
        height: 7px;
        flex: 0 0 auto;
        border-right: 1.5px solid currentColor;
        border-bottom: 1.5px solid currentColor;
        transform: translateY(-2px) rotate(45deg);
      }

      .filter-select-control:hover,
      .filter-select-control[aria-expanded="true"],
      .filter-select-control:focus-visible {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(31, 52, 114, 0.08);
        outline: none;
      }

      .filter-select-menu {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        right: 0;
        z-index: 1200;
        padding: 0;
        border: 1px solid var(--line-soft);
        border-radius: var(--dropdown-radius);
        background: var(--white);
        box-shadow: var(--dropdown-shadow);
        overflow: hidden;
        opacity: 0;
        transform: translateY(-4px);
        pointer-events: none;
        transition: opacity 0.16s ease, transform 0.16s ease;
      }

      .filter-select.open .filter-select-menu {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .filter-select-option {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
        width: 100%;
        min-height: var(--dropdown-item-min-h);
        padding: var(--dropdown-item-padding);
        border: 0;
        border-radius: 0;
        background: transparent;
        color: var(--dropdown-text);
        font-size: 14px;
        font-weight: 400;
        line-height: 1.4;
        text-align: left;
        white-space: nowrap;
      }

      .filter-select-option:hover,
      .filter-select-option.active {
        background: var(--dropdown-hover);
        color: var(--dropdown-text);
        font-weight: 400;
      }

      .panel-card {
        overflow: hidden;
        padding: 20px;
      }

      .table-wrap {
        --action-col-w: 150px;
        width: 100%;
        overflow-x: auto;
        overflow-y: visible;
        -webkit-overflow-scrolling: touch;
        position: relative;
      }

      .table-wrap::-webkit-scrollbar {
        height: 8px;
      }

      .table-wrap::-webkit-scrollbar-thumb {
        border-radius: 999px;
        background: rgba(93, 100, 125, 0.24);
      }

      table {
        width: 100%;
        min-width: 2360px;
        border-collapse: separate;
        border-spacing: 0;
      }

      th,
      td {
        min-width: 170px;
        max-width: 220px;
        padding: 14px 20px;
        border-bottom: 1px solid var(--line-soft);
        text-align: left;
        white-space: nowrap;
      }

      th {
        position: relative;
        height: auto;
        background: #f6f7f9;
        color: #666666;
        font-size: 13px;
        font-weight: 500;
      }

      td {
        height: auto;
        color: #333333;
        font-size: 14px;
        font-weight: 500;
      }

      tr:hover td {
        background: #f9fafb;
      }

      .table-action-cell {
        position: sticky;
        right: 0;
        z-index: 3;
        width: var(--action-col-w);
        min-width: var(--action-col-w);
        max-width: var(--action-col-w);
        background: var(--white);
        border-left: 1px solid rgba(237, 239, 244, 0.9);
        box-shadow: none;
      }

      th.table-action-cell {
        z-index: 4;
        background: #f6f7f9;
      }

      .table-action-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        height: 40px;
        padding: 6px 16px;
        border: 1px solid var(--primary);
        border-radius: 4px;
        background: var(--primary);
        color: var(--white);
        font-size: 14px;
        font-weight: 500;
        line-height: 1.4;
        white-space: nowrap;
        transition: box-shadow 0.18s ease, transform 0.18s ease;
      }

      .table-action-button:hover {
        background: var(--primary);
      }

      .table-action-button:disabled,
      .table-action-button.disabled {
        border-color: transparent;
        background: #dcdcdc;
        color: var(--white);
        cursor: not-allowed;
        box-shadow: none;
        transform: none;
      }

      .table-action-button:disabled:hover,
      .table-action-button.disabled:hover {
        background: #dcdcdc;
      }

      .table-action-button svg {
        width: 16px;
        height: 16px;
        flex: 0 0 auto;
      }

      .action-menu {
        position: fixed;
        z-index: 1500;
        display: grid;
        width: 150px;
        overflow: hidden;
        border: 1px solid var(--line-soft);
        border-radius: var(--dropdown-radius);
        background: var(--white);
        box-shadow: var(--dropdown-shadow);
        opacity: 0;
        transform: translateY(-4px);
        pointer-events: none;
        transition: opacity 0.14s ease, transform 0.14s ease;
      }

      .action-menu.open {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .action-menu-item {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
        width: 100%;
        min-height: 40px;
        padding: var(--dropdown-item-padding);
        border: 0;
        background: transparent;
        color: var(--dropdown-text);
        font-size: 14px;
        font-weight: 400;
        line-height: 1.4;
        text-align: left;
      }

      .action-menu-item span:empty {
        display: none;
      }

      .action-menu-item:hover {
        background: var(--dropdown-hover);
        color: var(--dropdown-text);
        font-weight: 400;
      }

      .table-pagination {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 12px 0 0;
      }

      .page-size-control,
      .page-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #e9ebf0;
        border-radius: 4px;
        background: var(--white);
        color: #999999;
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
      }

      .page-size-control {
        gap: 8px;
        min-width: 32px;
        height: 30px;
        padding: 8px 6px;
      }

      .page-size-wrap {
        position: relative;
        display: inline-flex;
      }

      .page-size-control span {
        color: #999999;
        font-size: 13px;
      }

      .page-size-menu {
        position: absolute;
        left: 0;
        bottom: calc(100% + 6px);
        z-index: 1200;
        display: grid;
        width: 72px;
        gap: 0;
        padding: 0;
        border: 1px solid var(--line-soft);
        border-radius: var(--dropdown-radius);
        background: var(--white);
        box-shadow: var(--dropdown-shadow);
        overflow: hidden;
        opacity: 0;
        transform: translateY(4px);
        pointer-events: none;
        transition: opacity 0.14s ease, transform 0.14s ease;
      }

      .page-size-wrap.open .page-size-menu {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .page-size-option {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: var(--dropdown-item-min-h);
        padding: var(--dropdown-item-padding);
        border: 0;
        border-radius: 0;
        background: transparent;
        color: var(--dropdown-text);
        font-size: 14px;
        font-weight: 400;
        line-height: 1.4;
        text-align: left;
      }

      .page-size-option:hover,
      .page-size-option.active {
        background: var(--dropdown-hover);
        color: var(--dropdown-text);
        font-weight: 400;
      }

      .page-size-option span:last-child {
        opacity: 0;
      }

      .page-size-option.active span:last-child {
        opacity: 1;
      }

      .pager {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .pager-label {
        color: #999999;
        font-size: 12px;
        font-weight: 500;
        text-transform: capitalize;
      }

      .pager-pages {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .page-button {
        width: 30px;
        height: 30px;
        border-color: transparent;
        background: #f4f4f5;
        color: #808080;
        font-weight: 500;
      }

      .page-button.active {
        border-color: var(--primary);
        color: var(--primary);
      }

      .page-button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 3px 8px;
        border-radius: 3px;
        font-size: 12px;
        font-weight: 700;
      }

      .tag.success {
        background: rgba(36, 166, 97, 0.1);
        color: var(--success);
      }

      .tag.warning {
        background: rgba(255, 174, 87, 0.14);
        color: #b86b0d;
      }

      .tag.neutral {
        background: #edf1f7;
        color: var(--pale);
      }

      .mobile-cards {
        display: none;
        padding: 12px;
        gap: 12px;
      }

      .mobile-record {
        display: grid;
        gap: 8px;
        padding: 14px;
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        background: var(--white);
      }

      .record-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .record-label {
        color: var(--muted);
        font-size: 12px;
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: none;
        background: rgba(0, 0, 0, 0.28);
      }

      .app.drawer-open .overlay {
        display: block;
      }

      .toast {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 80;
        max-width: min(360px, calc(100vw - 32px));
        padding: 12px 16px;
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        background: var(--white);
        color: #333333;
        box-shadow: var(--shadow-popup);
        opacity: 0;
        transform: translateY(10px);
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      [hidden] { display: none !important; }

      @media (max-width: 1180px) {
        .valuation,
        .asset-summary {
          display: none;
        }

        .filter-card {
          grid-template-columns: repeat(2, minmax(180px, 1fr));
        }
      }

      @media (max-width: 900px) {
        :root {
          --topbar-h: 56px;
          --sidebar-w: 280px;
        }

        body {
          font-size: 13px;
          line-height: 19px;
        }

        .topbar {
          padding: 0 16px;
        }

        .menu-trigger {
          display: grid;
        }

        .topbar-left {
          gap: 12px;
        }

        .brand-logo {
          width: 108px;
        }

        .mode-wrap {
          display: none;
        }

        .topbar-icons,
        .topbar-divider,
        .user-box > div:not(.avatar) {
          display: none;
        }

        .language-button span {
          display: none;
        }

        .layout {
          min-height: calc(100vh - var(--topbar-h));
        }

        .sidebar {
          position: fixed;
          top: var(--topbar-h);
          left: 0;
          bottom: 0;
          z-index: 60;
          height: auto;
          transform: translateX(-100%);
          box-shadow: none;
        }

        .app.drawer-open .sidebar {
          transform: translateX(0);
        }

        .app.sidebar-collapsed {
          --sidebar-w: 280px;
        }

        .sidebar-collapsed .nav-scroll {
          padding: 12px 0 64px !important;
        }

        .sidebar-collapsed .nav-item {
          display: flex;
          align-items: center;
          justify-content: flex-start;
          padding: 10px 16px;
          min-height: 38px;
        }

        .sidebar-collapsed .sub-nav .nav-item {
          padding-left: 50px;
        }

        .sidebar-collapsed .nav-section-title,
        .sidebar-collapsed .nav-text,
        .sidebar-collapsed .nav-caret,
        .sidebar-collapsed .nav-badge,
        .sidebar-collapsed .sub-nav {
          display: flex;
        }

        .sidebar-collapsed .nav-text {
          display: block;
        }

        .sidebar-collapsed .sub-nav {
          display: grid;
        }

        .sidebar-flyout {
          display: none;
        }

        .collapse-bar {
          display: none;
        }

        .content {
          padding: 20px;
        }

        .page-head {
          flex-direction: column;
        }

        .actions {
          width: 100%;
        }

        .actions .btn {
          flex: 1;
        }
      }

      @media (max-width: 640px) {
        .topbar {
          padding: 0 12px;
        }

        .brand-logo {
          width: 82px;
        }

        .content {
          padding: 16px;
        }

        .headline {
          font-size: 22px;
        }

        .filter-card {
          grid-template-columns: 1fr;
          padding: 14px;
        }

        .filter-card .btn {
          width: 100%;
        }

        .tabs {
          gap: 12px;
          margin-bottom: 16px;
        }

        .tab {
          padding: 0 10px;
          font-size: 14px;
        }

        .table-wrap {
          display: block;
          padding-bottom: 4px;
        }

        .mobile-cards {
          display: none;
        }

        .panel-card {
          padding: 16px;
        }

        .table-pagination {
          align-items: flex-start;
          flex-direction: column;
          padding: 12px 0 0;
        }

        .pager {
          width: 100%;
          justify-content: space-between;
          gap: 12px;
        }

        .pager-pages {
          gap: 8px;
        }
      }

    <div class="app" id="app">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-trigger" id="menuTrigger" type="button" aria-label="打开菜单">
            <svg viewBox="0 0 20 20" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 5h14M3 10h14M3 15h14" /></svg>
          </button>

              <span id="modeLabel">Backoffice interface</span>

              <button class="mode-option" type="button" data-mode="admin">Admin interface</button>
            </div>
          </div>
        </div>

        <div class="topbar-right" id="topbarRight"></div>
      </header>

      <div class="layout">
        <aside class="sidebar" id="sidebar" aria-label="主导航">
          <nav class="nav-scroll" id="navScroll"></nav>
          <div class="scroll-touch" id="scrollTouch" aria-hidden="true">
            <div class="scroll-thumb" id="scrollThumb"></div>
          </div>
          <div class="sidebar-flyout" id="sidebarFlyout" role="menu" aria-hidden="true"></div>
          <div class="collapse-bar">
            <button class="collapse-button" id="collapseButton" type="button" aria-label="折叠菜单">
              <img class="collapse-icon collapse-icon-collapse" src="assets/sidebar-collapse.svg" alt="" aria-hidden="true" />
              <img class="collapse-icon collapse-icon-expand" src="assets/sidebar-expand.svg" alt="" aria-hidden="true" />
            </button>
          </div>
        </aside>

        <main class="content">
          <div class="content-shell">
            <div class="page-head">
              <div>
                <h1 class="headline" id="headline">Headline</h1>

              </div>
              <div class="actions">
                <button class="btn secondary" id="resetButton" type="button">Reset</button>
                <button class="btn" id="primaryAction" type="button">Create</button>
              </div>
            </div>

            <div class="tabs" id="tabs"></div>

            <section class="card filter-card" id="filterCard" aria-label="筛选条件"></section>

            <section class="card panel-card">
              <div class="table-wrap">
                <table>

                  <tbody id="tableBody"></tbody>
                </table>
              </div>
              <div class="mobile-cards" id="mobileCards"></div>
              <div class="table-pagination" id="pagination" aria-label="Pagination"></div>
            </section>
          </div>
        </main>
      </div>

      <div class="overlay" id="overlay"></div>
      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </div>

      function statusClass(status) {
        const normalized = status.toLowerCase();
        if (normalized.includes("approved")) return "success";
        if (normalized.includes("pending") || normalized.includes("processing")) return "warning";
        return "neutral";
      }

      function showToast(message) {
        toast.textContent = message;

        state.toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);

      function actionMenuTemplate(rowKey = "") {
        return `
          <button class="action-menu-item" type="button" data-action-menu="Edit" role="menuitem">Edit</button>
          <button class="action-menu-item" type="button" data-action-menu="Copy" role="menuitem">Copy</button>
          <button class="action-menu-item" type="button" data-action-menu="Delete" role="menuitem">Delete</button>
        `;
      }

      function rowHasActionPermission(row) {
        const status = String(row[3] || "").toLowerCase();
        return !status.includes("pending") && !status.includes("review");
      }

      function actionButtonTemplate(row, actionIcon) {
        const disabled = !rowHasActionPermission(row);
        const disabledAttrs = disabled ? ` disabled aria-disabled="true" title="${t("No permission")}"` : "";
        return `<button class="table-action-button ${disabled ? "disabled" : ""}" type="button" data-action="Actions" data-row-key="${row[0]}"${disabledAttrs}>${actionIcon}<span>${t("Actions")}</span></button>`;
      }

      function closeActionMenu() {
        actionMenu.classList.remove("open");
        actionMenu.setAttribute("aria-hidden", "true");
        state.activeActionRow = "";
      }

      function openActionMenu(button) {
        const rect = button.getBoundingClientRect();
        const width = Math.max(150, Math.round(rect.width));
        actionMenu.style.width = `${width}px`;
        actionMenu.innerHTML = actionMenuTemplate(button.dataset.rowKey || "");
        actionMenu.classList.add("open");
        actionMenu.setAttribute("aria-hidden", "false");

        const menuHeight = actionMenu.offsetHeight || 244;
        const left = Math.min(Math.max(8, rect.left), window.innerWidth - width - 8);
        const top = Math.min(rect.bottom + 8, window.innerHeight - menuHeight - 8);
        actionMenu.style.left = `${left}px`;
        actionMenu.style.top = `${Math.max(8, top)}px`;
        state.activeActionRow = button.dataset.rowKey || "";
      }

      function toggleActionMenu(button) {
        const rowKey = button.dataset.rowKey || "";
        if (actionMenu.classList.contains("open") && state.activeActionRow === rowKey) {
          closeActionMenu();
          return;
        }
        openActionMenu(button);
      }

              <button class="icon-button" type="button" data-action="News" aria-label="${t("News")}">${clientTopbarIcon.news}</button>
              <button class="icon-button" type="button" data-action="Calendar" aria-label="${t("Calendar")}">${clientTopbarIcon.calendar}</button>
            </nav>
            ${languageTemplate()}
            ${userTemplate(true)}
          `;
        }

        return `
          ${languageTemplate()}
          ${userTemplate(false)}
        `;
      }

      function languageTemplate() {
        return `
          <div class="language-wrap">
            <button class="language-button" id="languageControl" type="button" aria-expanded="false" aria-haspopup="true" aria-label="${t("Language")}">
              <svg viewBox="0 0 20 20" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="7"/><path d="M3 10h14M10 3c2 2 3 4.3 3 7s-1 5-3 7M10 3c-2 2-3 4.3-3 7s1 5 3 7"/></svg>
              <span>${languageNames[state.lang]}</span>
            </button>
            <div class="language-menu" id="languageMenu" role="menu">
              <button class="language-option ${state.lang === "en" ? "active" : ""}" type="button" data-lang="en" role="menuitem">${t("English")}</button>
              <button class="language-option ${state.lang === "zh" ? "active" : ""}" type="button" data-lang="zh" role="menuitem">${t("Chinese")}</button>
            </div>
          </div>
        `;
      }

      function userTemplate(showStatus) {
        return `
          <div class="user-box">
            <div class="avatar" aria-hidden="true"><svg viewBox="0 0 24 24" width="21" height="21" fill="currentColor"><circle cx="8.5" cy="10" r="1.6"/><circle cx="15.5" cy="10" r="1.6"/><path d="M8 15c1.1 1 2.4 1.5 4 1.5s2.9-.5 4-1.5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></div>
            <div><div class="user-name">Fuji Jiro ⌄</div>${showStatus ? `<div class="user-status">${t("Verified")}</div>` : ""}</div>
          </div>
        `;
      }

      function renderNav() {
        const current = data[state.mode];
        navScroll.innerHTML = current.nav.map((item) => {
          if (item.title) return `<div class="nav-section-title">${t(item.title)}</div>`;
          const hasChildren = Boolean(item.children?.length);
          const groupCollapsed = state.collapsedGroups.has(item.id);
          const children = hasChildren ? `<div class="sub-nav">${item.children.map((child) => navButton(child, true)).join("")}</div>` : "";
          return `<div class="nav-group ${groupCollapsed ? "collapsed" : ""}" data-group="${item.id}">${navButton(item, false, hasChildren)}${children}</div>`;
        }).join("");
        syncScrollThumb();
      }

      function findNavItem(id, items = data[state.mode].nav) {
        for (const item of items) {
          if (item.id === id) return item;
          if (item.children) {
            const found = findNavItem(id, item.children);
            if (found) return found;
          }
        }
        return null;
      }

      function findParentNavItem(childId, items = data[state.mode].nav) {
        for (const item of items) {
          if (item.children?.some((child) => child.id === childId)) return item;
          if (item.children) {
            const found = findParentNavItem(childId, item.children);
            if (found) return found;
          }
        }
        return null;
      }

      function getDefaultCollapsedGroups(mode, activeId) {
        const activeParent = findParentNavItem(activeId, data[mode].nav);
        return new Set(
          data[mode].nav
            .filter((item) => item.children?.length && item.id !== activeParent?.id)
            .map((item) => item.id)
        );
      }

      function navButton(item, isChild, hasChildren = false) {
        const active = item.id === state.activeNav;
        const parentActive = !isChild && hasChildren && item.children.some((child) => child.id === state.activeNav);
        const childBadgeTotal = item.children?.reduce((total, child) => total + (Number(child.badge) || 0), 0) || 0;
        const badgeValue = item.badge || childBadgeTotal;
        const badge = badgeValue ? `<span class="nav-badge">${badgeValue}</span>` : "";
        const shouldReserveCaretSlot = isChild || Boolean(badgeValue);
        const caret = hasChildren
          ? '<span class="nav-caret">⌃</span>'
          : shouldReserveCaretSlot ? '<span class="nav-caret nav-caret-placeholder">⌃</span>' : "";
        const itemIcon = isChild ? "" : (icon[item.icon] || icon.dashboard);
        return `<button class="nav-item ${active ? "active" : ""} ${parentActive ? "parent-active" : ""}" type="button" data-nav="${item.id}" data-child="${isChild}" data-has-children="${hasChildren}">${itemIcon}<span class="nav-text">${t(item.label)}</span>${badge}${caret}</button>`;
      }

      function getActiveNavBadgeTotal() {
        const activeItem = findNavItem(state.activeNav);
        return Number(activeItem?.badge) || 0;
      }

      function getSyncedTabs() {
        const baseTabs = data[state.mode].tabs;
        const total = getActiveNavBadgeTotal();
        if (!total || baseTabs.length === 0) {
          return baseTabs.map((tab) => ({ ...tab, badge: 0 }));
        }

        const firstBadge = Math.max(1, Math.floor(total * 0.3));
        return baseTabs.map((tab, index) => ({
          ...tab,
          badge: index === 0 ? firstBadge : index === 1 ? total - firstBadge : 0
        }));
      }

      function renderTabs() {
        const syncedTabs = getSyncedTabs();
        tabs.innerHTML = syncedTabs.map((tab) => `
          <button class="tab ${tab.id === state.activeTab ? "active" : ""}" type="button" data-tab="${tab.id}">
            ${t(tab.label)}${tab.badge ? ` <span class="nav-badge">${tab.badge}</span>` : ""}
          </button>
        `).join("");
      }

      function renderFilters() {
        const current = data[state.mode];
        const statusOptions = ["All", "Approved", "Pending", "Review"];
        const selectedStatus = statusOptions.includes(state.filterStatus) ? state.filterStatus : "All";
        const controls = current.filters.map((name, index) => {
          if (index === 1) {
            return `
              <div class="field">
                <label>${t(name)}</label>
                <div class="filter-select" data-filter-select>
                  <button class="filter-select-control" type="button" aria-haspopup="listbox" aria-expanded="false">${t(selectedStatus)}</button>
                  <div class="filter-select-menu" role="listbox">
                    ${statusOptions.map((option) => `<button class="filter-select-option ${option === selectedStatus ? "active" : ""}" type="button" data-filter-value="${option}" role="option" aria-selected="${option === selectedStatus}">${t(option)}</button>`).join("")}
                  </div>
                </div>
              </div>`;
          }
          return `<div class="field"><label>${t(name)}</label><input type="text" placeholder="${searchPlaceholder(name)}" /></div>`;
        }).join("");
        filterCard.innerHTML = `${controls}<button class="btn" type="button" id="searchButton">${t("Search")}</button>`;
      }

      function renderPagination(totalRows, totalPages) {
        const pageButtons = Array.from({ length: totalPages }, (_, index) => {
          const page = index + 1;
          return `<button class="page-button ${page === state.activePage ? "active" : ""}" type="button" data-page="${page}" aria-label="${t("Page")} ${page}">${page}</button>`;
        }).join("");

        const pageSizeOptions = [5, 10, 15, 20];
        pagination.innerHTML = `
          <div class="page-size-wrap">
            <button class="page-size-control" type="button" data-page-size-toggle aria-label="${t("Rows per page")}" aria-haspopup="listbox" aria-expanded="false">${state.rowsPerPage}<span aria-hidden="true">⌄</span></button>
            <div class="page-size-menu" role="listbox">
              ${pageSizeOptions.map((size) => `<button class="page-size-option ${size === state.rowsPerPage ? "active" : ""}" type="button" data-page-size="${size}" role="option" aria-selected="${size === state.rowsPerPage}"><span>${size}</span><span>✓</span></button>`).join("")}
            </div>
          </div>
          <div class="pager">
            <span class="pager-label">${t("Page")}</span>
            <div class="pager-pages">
              <button class="page-button" type="button" data-page="prev" aria-label="Previous page" ${state.activePage === 1 ? "disabled" : ""}>‹</button>
              ${pageButtons}
              <button class="page-button" type="button" data-page="next" aria-label="Next page" ${state.activePage === totalPages ? "disabled" : ""}>›</button>
            </div>
          </div>
        `;
      }

      function tableHeadersForMode(mode) {
        if (mode === "backoffice") {
          return ["Referral ID", "Client", "Volume", "Status", "Updated", "Region", "Owner", "Account Type", "IB Level", "Rebate", "Net Deposit", "Last Login", "Risk Level", "Remark"];

          return ["Ticket", "Module", "Amount", "Status", "Updated", "Operator", "Channel", "Currency", "Role", "Affected Users", "Published", "Version", "Review Owner", "Remark"];

        const actionIcon = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><g clip-path="url(#actionIconClip)"><path opacity="0.01" fill-rule="evenodd" clip-rule="evenodd" d="M16 0V16H0V0H16Z" stroke="currentColor" stroke-width="1.3"/><path d="M9.56657 8.00001C9.56657 7.13477 8.86541 6.43361 8.00016 6.43361C7.13492 6.43361 6.43376 7.13477 6.43376 8.00001C6.43376 8.86526 7.13492 9.56642 8.00016 9.56642C8.86541 9.56642 9.56657 8.86526 9.56657 8.00001ZM10.4338 8.00001C10.4338 9.34391 9.34406 10.4336 8.00016 10.4336C6.65627 10.4336 5.56657 9.34391 5.56657 8.00001C5.56657 6.65612 6.65627 5.56642 8.00016 5.56642C9.34406 5.56642 10.4338 6.65612 10.4338 8.00001Z" fill="currentColor"/><path d="M14.2404 7.4131C14.2403 6.95408 13.8624 6.57989 13.4071 6.57977C12.7115 6.57977 12.1075 6.33058 11.8049 5.80568C11.5023 5.28067 11.5889 4.63268 11.9383 4.02964L11.9767 3.95477C12.136 3.599 12.022 3.17025 11.7033 2.94175L11.6317 2.89617L10.478 2.23602L10.4722 2.23211C10.1595 2.04608 9.7417 2.15207 9.54574 2.48146L9.47542 2.60385C9.12594 3.20677 8.60656 3.60516 8.00081 3.60516C7.39445 3.60508 6.87695 3.2058 6.53076 2.6019L6.4611 2.48146L6.42204 2.42221C6.21364 2.13998 5.82842 2.05796 5.53532 2.23211L5.52881 2.23602L4.37516 2.89617C3.9781 3.12307 3.84159 3.63656 4.06852 4.02964L4.13102 4.14292C4.42748 4.71297 4.48566 5.31342 4.20199 5.80568C3.89941 6.33047 3.29585 6.5797 2.60042 6.57977C2.1413 6.57977 1.7672 6.9577 1.76709 7.4131V8.58693C1.76725 9.04229 2.14133 9.42026 2.60042 9.42026C3.29588 9.42032 3.89942 9.66951 4.20199 10.1943C4.48567 10.6866 4.42751 11.287 4.13102 11.8571L4.06852 11.9704C3.85589 12.3388 3.96247 12.8128 4.30355 13.0576L4.37516 13.1039L5.52881 13.764L5.53532 13.7673C5.84797 13.9532 6.26512 13.8479 6.4611 13.5186L6.53206 13.3962L6.59912 13.2855C6.94631 12.7448 7.43804 12.3949 8.00602 12.3949C8.61194 12.3949 9.12921 12.7931 9.47542 13.3962L9.54574 13.5186L9.58545 13.5778C9.79397 13.8599 10.1791 13.9416 10.4722 13.7673L10.478 13.764L11.6317 13.1039L11.7033 13.0583C12.0444 12.8143 12.1519 12.3445 11.937 11.9684C11.5888 11.3661 11.5027 10.7186 11.8049 10.1943C12.1074 9.6694 12.7115 9.42026 13.4071 9.42026C13.8661 9.42013 14.2402 9.04221 14.2404 8.58693V7.4131ZM15.1069 8.58693C15.1068 9.51789 14.3477 10.2867 13.4071 10.2868C12.8961 10.2868 12.6496 10.464 12.5555 10.6273C12.4733 10.7701 12.44 11.0191 12.605 11.376L12.6883 11.5361L12.6896 11.5381C13.1537 12.3503 12.8787 13.3898 12.062 13.8565L12.0614 13.8558L10.909 14.516L10.9084 14.5153C10.1687 14.9507 9.23044 14.6832 8.80094 13.9613L8.79834 13.9574L8.72542 13.8304L8.72412 13.8291C8.47035 13.3864 8.19458 13.2614 8.00602 13.2614C7.81683 13.2614 7.5392 13.3869 7.28206 13.8304L7.2085 13.9574L7.20589 13.9613C6.77638 14.6832 5.83818 14.9508 5.09847 14.5153L3.94548 13.8558C3.12933 13.3894 2.8524 12.3437 3.31852 11.5368C3.57556 11.0933 3.54536 10.7905 3.45133 10.6273C3.35725 10.464 3.11126 10.2869 2.60042 10.2868C1.65972 10.2868 0.90006 9.51797 0.899902 8.58693V7.4131C0.900014 6.48202 1.65969 5.71323 2.60042 5.71323C3.11126 5.71317 3.35725 5.536 3.45133 5.37273C3.54539 5.2095 3.57559 4.90739 3.31852 4.46388C2.85239 3.65705 3.1288 2.61 3.94482 2.14357L5.09196 1.48797C5.8325 1.04748 6.77515 1.31438 7.20589 2.0381L7.2085 2.04266L7.28206 2.16961L7.28272 2.17091C7.53642 2.61348 7.81226 2.73854 8.00081 2.73862C8.19003 2.73862 8.46826 2.61321 8.72542 2.16961L8.79834 2.04266L8.80094 2.0381C9.23053 1.31624 10.1693 1.04846 10.909 1.48406L12.062 2.14357L12.2085 2.23797C12.9096 2.74014 13.1258 3.70684 12.689 4.46323L12.6883 4.46388C12.4313 4.90733 12.4615 5.20949 12.5555 5.37273C12.6496 5.53603 12.8961 5.71323 13.4071 5.71323C14.3381 5.71336 15.1068 6.47247 15.1069 7.4131V8.58693Z" fill="currentColor"/></g><defs><clipPath id="actionIconClip"><rect width="16" height="16" fill="currentColor"/></clipPath></defs></svg>';
        const totalRows = current.rows.length;
        const totalPages = Math.max(1, Math.ceil(totalRows / state.rowsPerPage));
        state.activePage = Math.min(state.activePage, totalPages);
        const start = (state.activePage - 1) * state.rowsPerPage;
        const pageRows = current.rows.slice(start, start + state.rowsPerPage);
        const displayRows = pageRows.map((row, index) => widenTableRow(row, start + index));

        tableHead.innerHTML = `<tr>${headers.map((head) => `<th>${t(head)}</th>`).join("")}<th class="table-action-cell">${t("Actions")}</th></tr>`;
        tableBody.innerHTML = displayRows.map((row) => `
          <tr>${row.map((cell, index) => index === 3 ? `<td><span class="tag ${statusClass(cell)}">${t(cell)}</span></td>` : `<td>${t(cell)}</td>`).join("")}<td class="table-action-cell">${actionButtonTemplate(row, actionIcon)}</td></tr>
        `).join("");

          <article class="mobile-record">
            ${headers.map((head, index) => `<div class="record-line"><span class="record-label">${t(head)}</span><span>${index === 3 ? `<span class="tag ${statusClass(row[index])}">${t(row[index])}</span>` : t(row[index])}</span></div>`).join("")}

      function renderModeOptions() {
        document.querySelectorAll(".mode-option").forEach((button) => {
          const active = button.dataset.mode === state.mode;
          button.classList.toggle("active", active);
          button.textContent = t(data[button.dataset.mode].label);
        });
      }

      function setMode(mode) {
        state.mode = mode;
        state.activeNav = data[mode].active;
        state.activeTab = data[mode].tabs[0].id;
        state.activePage = 1;
        state.headlineKey = "Headline";
        state.collapsedGroups = getDefaultCollapsedGroups(mode, state.activeNav);
        app.classList.toggle("mode-client", mode === "client");
        app.classList.toggle("mode-backoffice", mode === "backoffice");
        app.classList.toggle("mode-admin", mode === "admin");
        modeLabel.textContent = t(data[mode].label);
        topbarRight.innerHTML = topbarTemplate();
        updateStaticText();
        renderModeOptions();
        renderNav();
        renderTabs();
        renderFilters();
        renderTable();
        closeModeMenu();
        closeDrawer();
        showToast(mode === "admin" ? t("Switched to Admin") : mode === "backoffice" ? t("Switched to Backoffice") : t("Switched to Client"));
      }

      function updateStaticText() {
        document.documentElement.lang = state.lang === "zh" ? "zh-CN" : "en";
        document.title = state.lang === "zh"
          ? `SPEC ${t(data[state.mode].label)} UI 演示`
          : state.mode === "admin" ? "SPEC Admin UI Demo" : state.mode === "backoffice" ? "SPEC Backoffice UI Demo" : "SPEC Client UI Demo";
        modeLabel.textContent = t(data[state.mode].label);
        headline.textContent = t(state.headlineKey);
        pageSubtitle.textContent = t(data[state.mode].subtitle);
        document.getElementById("resetButton").textContent = t("Reset");
        document.getElementById("primaryAction").textContent = t("Create");
        menuTrigger.setAttribute("aria-label", t("Open menu"));
        sidebar.setAttribute("aria-label", t("Main navigation"));
        collapseButton.setAttribute("aria-label", t("Collapse menu"));
        filterCard.setAttribute("aria-label", t("Filter conditions"));
      }

      function renderAll() {
        updateStaticText();
        renderModeOptions();
        topbarRight.innerHTML = topbarTemplate();
        renderNav();
        renderTabs();
        renderFilters();
        renderTable();
        closeModeMenu();
        closeLanguageMenu();
      }

      function setLanguage(lang) {
        if (!languageNames[lang] || state.lang === lang) {
          closeLanguageMenu();
          return;
        }
        state.lang = lang;
        renderAll();
        showToast(lang === "zh" ? t("Language switched to Chinese") : "Language switched to English");
      }

      function closeModeMenu() {
        modeMenu.classList.remove("open");
        modeControl.setAttribute("aria-expanded", "false");
      }

      function closeLanguageMenu() {
        const languageMenu = document.getElementById("languageMenu");
        const languageControl = document.getElementById("languageControl");
        languageMenu?.classList.remove("open");
        languageControl?.setAttribute("aria-expanded", "false");
      }

      function closeFilterSelect() {
        document.querySelectorAll(".filter-select.open").forEach((select) => {
          select.classList.remove("open");
          select.querySelector(".filter-select-control")?.setAttribute("aria-expanded", "false");
        });
      }

      function toggleFilterSelect(select) {
        const open = !select.classList.contains("open");
        closeFilterSelect();
        select.classList.toggle("open", open);
        select.querySelector(".filter-select-control")?.setAttribute("aria-expanded", String(open));
      }

      function closePageSizeMenu() {
        const wrap = pagination.querySelector(".page-size-wrap");
        wrap?.classList.remove("open");
        wrap?.querySelector(".page-size-control")?.setAttribute("aria-expanded", "false");
      }

      function togglePageSizeMenu() {
        const wrap = pagination.querySelector(".page-size-wrap");
        if (!wrap) return;
        const open = !wrap.classList.contains("open");
        closePageSizeMenu();
        wrap.classList.toggle("open", open);
        wrap.querySelector(".page-size-control")?.setAttribute("aria-expanded", String(open));
      }

      function toggleModeMenu() {
        const open = !modeMenu.classList.contains("open");
        modeMenu.classList.toggle("open", open);
        modeControl.setAttribute("aria-expanded", String(open));
      }

      function toggleLanguageMenu() {
        const languageMenu = document.getElementById("languageMenu");
        const languageControl = document.getElementById("languageControl");
        if (!languageMenu || !languageControl) return;
        const open = !languageMenu.classList.contains("open");
        languageMenu.classList.toggle("open", open);
        languageControl.setAttribute("aria-expanded", String(open));
      }

      function closeDrawer() {
        app.classList.remove("drawer-open");
      }

      function closeSidebarFlyout() {
        sidebarFlyout.classList.remove("open");
        sidebarFlyout.setAttribute("aria-hidden", "true");
      }

      function scheduleFlyoutClose() {
        clearTimeout(state.flyoutTimer);
        state.flyoutTimer = setTimeout(closeSidebarFlyout, 140);
      }

      function openSidebarFlyout(group, trigger) {
        if (!app.classList.contains("sidebar-collapsed") || window.matchMedia("(max-width: 900px)").matches) return;
        if (!group?.children?.length) {
          closeSidebarFlyout();
          return;
        }

        clearTimeout(state.flyoutTimer);
        sidebarFlyout.innerHTML = group.children.map((child) => `
          <button class="sidebar-flyout-item ${child.id === state.activeNav ? "active" : ""}" type="button" data-nav="${child.id}" role="menuitem">
            <span class="sidebar-flyout-label">${t(child.label)}</span>
            ${child.badge ? `<span class="nav-badge">${child.badge}</span>` : ""}
          </button>
        `).join("");

        const rect = trigger.getBoundingClientRect();
        const viewportPadding = 12;
        const maxFlyoutHeight = window.innerHeight - viewportPadding * 2;
        sidebarFlyout.style.left = `${rect.right + 8}px`;
        sidebarFlyout.style.maxHeight = `${maxFlyoutHeight}px`;
        sidebarFlyout.style.top = `${viewportPadding}px`;
        sidebarFlyout.classList.add("open");

        const flyoutHeight = Math.min(sidebarFlyout.scrollHeight, maxFlyoutHeight);
        const top = Math.min(
          Math.max(viewportPadding, rect.top - 6),
          window.innerHeight - flyoutHeight - viewportPadding
        );
        sidebarFlyout.style.top = `${top}px`;
        sidebarFlyout.style.maxHeight = `${window.innerHeight - top - viewportPadding}px`;
        sidebarFlyout.setAttribute("aria-hidden", "false");
      }

      function syncScrollThumb() {
        const viewHeight = navScroll.clientHeight;
        const contentHeight = navScroll.scrollHeight;
        const trackHeight = scrollTouch.clientHeight;
        if (contentHeight <= viewHeight || trackHeight <= 0) {
          scrollThumb.style.display = "none";
          return;
        }
        scrollThumb.style.display = "block";
        const thumbHeight = Math.max(36, (viewHeight / contentHeight) * trackHeight);
        const maxTop = trackHeight - thumbHeight;
        const top = (navScroll.scrollTop / (contentHeight - viewHeight)) * maxTop;
        scrollThumb.style.height = `${thumbHeight}px`;
        scrollThumb.style.transform = `translateY(${top}px)`;
      }

      function revealScrollbar(keepVisible = false) {
        sidebar.classList.add("show-scrollbar");
        clearTimeout(state.hideTimer);
        if (!keepVisible) {
          state.hideTimer = setTimeout(() => {
            if (!state.dragging && !scrollTouch.matches(":hover")) sidebar.classList.remove("show-scrollbar");
          }, 850);
        }
      }

      modeControl.addEventListener("click", () => {
        closeLanguageMenu();
        closeFilterSelect();
        closePageSizeMenu();
        toggleModeMenu();
      });

      modeMenu.addEventListener("click", (event) => {
        const button = event.target.closest(".mode-option");
        if (!button) return;
        setMode(button.dataset.mode);
      });

      document.addEventListener("click", (event) => {
        if (!event.target.closest(".mode-wrap")) closeModeMenu();
        if (!event.target.closest(".language-wrap")) closeLanguageMenu();
        if (!event.target.closest(".filter-select")) closeFilterSelect();
        if (!event.target.closest(".page-size-wrap")) closePageSizeMenu();
        if (!event.target.closest(".table-action-button") && !event.target.closest(".action-menu")) closeActionMenu();
      });

      navScroll.addEventListener("click", (event) => {
        const button = event.target.closest(".nav-item");
        if (!button) return;
        const id = button.dataset.nav;
        const group = button.closest(".nav-group");
        const hasChildren = button.dataset.hasChildren === "true";
        if (hasChildren && group) {
          if (app.classList.contains("sidebar-collapsed") && !window.matchMedia("(max-width: 900px)").matches) {
            openSidebarFlyout(findNavItem(id), button);
            return;
          }
          state.collapsedGroups.has(id) ? state.collapsedGroups.delete(id) : state.collapsedGroups.add(id);
          group.classList.toggle("collapsed", state.collapsedGroups.has(id));
          showToast(state.collapsedGroups.has(id) ? t("Menu collapsed") : t("Menu expanded"));
          return;
        }
        state.activeNav = id;
        state.activePage = 1;
        state.headlineKey = findNavItem(id)?.label || "Headline";
        renderNav();
        renderTabs();
        headline.textContent = t(state.headlineKey);
        closeDrawer();
      });

      navScroll.addEventListener("pointerover", (event) => {
        const button = event.target.closest(".nav-item[data-has-children='true']");
        if (!button || !navScroll.contains(button)) return;
        openSidebarFlyout(findNavItem(button.dataset.nav), button);
      });

      navScroll.addEventListener("pointerleave", scheduleFlyoutClose);

      sidebarFlyout.addEventListener("pointerenter", () => clearTimeout(state.flyoutTimer));
      sidebarFlyout.addEventListener("pointerleave", scheduleFlyoutClose);
      sidebarFlyout.addEventListener("click", (event) => {
        const button = event.target.closest(".sidebar-flyout-item");
        if (!button) return;
        state.activeNav = button.dataset.nav;
        state.headlineKey = findNavItem(state.activeNav)?.label || "Headline";
        renderNav();
        renderTabs();
        headline.textContent = t(state.headlineKey);
        closeSidebarFlyout();
      });

      tabs.addEventListener("click", (event) => {
        const button = event.target.closest(".tab");
        if (!button) return;
        state.activeTab = button.dataset.tab;
        state.activePage = 1;
        renderTabs();
        showToast(`${t("Switched to")} ${button.textContent.trim().replace(/\s+/g, " ")}`);
      });

      filterCard.addEventListener("click", (event) => {
        const selectControl = event.target.closest(".filter-select-control");
        if (selectControl) {
          closeModeMenu();
          closeLanguageMenu();
          closePageSizeMenu();
          toggleFilterSelect(selectControl.closest(".filter-select"));
          return;
        }

        const option = event.target.closest(".filter-select-option");
        if (option) {
          state.filterStatus = option.dataset.filterValue || "All";
          renderFilters();
          return;
        }

        if (event.target.closest("#searchButton")) {
          closeFilterSelect();
          showToast(t("Filters applied"));
        }
      });

      document.querySelector(".panel-card").addEventListener("pointerover", (event) => {
        const button = event.target.closest(".table-action-button");
        if (!button || !actionMenu.classList.contains("open")) return;
        if ((button.dataset.rowKey || "") !== state.activeActionRow) closeActionMenu();
      });

      document.querySelector(".panel-card").addEventListener("click", (event) => {
        const pageSizeToggle = event.target.closest("[data-page-size-toggle]");
        if (pageSizeToggle) {
          closeActionMenu();
          togglePageSizeMenu();
          return;
        }

        const pageSizeOption = event.target.closest("[data-page-size]");
        if (pageSizeOption) {
          state.rowsPerPage = Number(pageSizeOption.dataset.pageSize) || 5;
          state.activePage = 1;
          closePageSizeMenu();
          renderTable();
          return;
        }

        const pageButton = event.target.closest(".page-button[data-page]");
        if (pageButton && !pageButton.disabled) {
          closePageSizeMenu();
          const totalPages = Math.max(1, Math.ceil(data[state.mode].rows.length / state.rowsPerPage));
          const target = pageButton.dataset.page;
          if (target === "prev") state.activePage = Math.max(1, state.activePage - 1);
          else if (target === "next") state.activePage = Math.min(totalPages, state.activePage + 1);
          else state.activePage = Number(target) || 1;
          renderTable();
          return;
        }

        const menuItem = event.target.closest("[data-action-menu]");
        if (menuItem) {
          showToast(actionMessage(menuItem.dataset.actionMenu));
          closeActionMenu();
          return;
        }

        const button = event.target.closest(".table-action-button");
        if (button && !button.disabled) {
          toggleActionMenu(button);
        }
      });

      actionMenu.addEventListener("click", (event) => {
        const menuItem = event.target.closest("[data-action-menu]");
        if (!menuItem) return;
        showToast(actionMessage(menuItem.dataset.actionMenu));
        closeActionMenu();
      });

      window.addEventListener("resize", closeActionMenu);
      document.querySelector(".table-wrap").addEventListener("scroll", closeActionMenu, { passive: true });

      topbarRight.addEventListener("click", (event) => {
        const languageButton = event.target.closest("#languageControl");
        if (languageButton) {
          closeModeMenu();
          toggleLanguageMenu();
          return;
        }
        const languageOption = event.target.closest(".language-option");
        if (languageOption) {
          setLanguage(languageOption.dataset.lang);
          return;
        }
        const button = event.target.closest("[data-action]");
        if (button) showToast(actionMessage(button.dataset.action));
      });

      document.getElementById("resetButton").addEventListener("click", () => setMode(state.mode));
      document.getElementById("primaryAction").addEventListener("click", () => showToast(t("Create action clicked")));
      menuTrigger.addEventListener("click", () => app.classList.add("drawer-open"));
      overlay.addEventListener("click", closeDrawer);
      collapseButton.addEventListener("click", () => {
        app.classList.toggle("sidebar-collapsed");
        closeSidebarFlyout();
        syncScrollThumb();
      });

      navScroll.addEventListener("scroll", () => {
        syncScrollThumb();
        revealScrollbar(false);
      });
      navScroll.addEventListener("wheel", () => revealScrollbar(false), { passive: true });
      navScroll.addEventListener("touchstart", () => revealScrollbar(false), { passive: true });
      scrollTouch.addEventListener("pointerenter", () => revealScrollbar(true));
      scrollTouch.addEventListener("pointerleave", () => {
        if (!state.dragging) sidebar.classList.remove("show-scrollbar");
      });
      scrollThumb.addEventListener("pointerdown", (event) => {
        state.dragging = true;
        state.dragStartY = event.clientY;
        const currentTransform = scrollThumb.style.transform.match(/translateY\(([-\d.]+)px\)/);
        state.dragStartTop = currentTransform ? Number(currentTransform[1]) : 0;
        scrollThumb.setPointerCapture(event.pointerId);
        revealScrollbar(true);
      });
      scrollThumb.addEventListener("pointermove", (event) => {
        if (!state.dragging) return;
        const trackHeight = scrollTouch.clientHeight;
        const thumbHeight = scrollThumb.offsetHeight;
        const maxTop = trackHeight - thumbHeight;
        const nextTop = Math.min(maxTop, Math.max(0, state.dragStartTop + event.clientY - state.dragStartY));
        const scrollMax = navScroll.scrollHeight - navScroll.clientHeight;
        navScroll.scrollTop = maxTop > 0 ? (nextTop / maxTop) * scrollMax : 0;
      });
      scrollThumb.addEventListener("pointerup", (event) => {
        state.dragging = false;
        scrollThumb.releasePointerCapture(event.pointerId);
        revealScrollbar(false);
      });

      window.addEventListener("resize", () => {
        closeSidebarFlyout();
        syncScrollThumb();
      });
      setMode("backoffice");
    </script>
  </body>
</html>
