name: Deploy main and test previews to GitHub Pages

on:
  push:
    branches: [main, test]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production source
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-site

      - name: Checkout test source
        uses: actions/checkout@v4
        with:
          ref: test
          path: test-site

      - name: Compose Pages artifact
        run: |
          set -euo pipefail
          mkdir public

          # Production preview: repository root.
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            main-site/ public/

          # Test preview: /test/ under the same Pages site.
          mkdir -p public/test
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            test-site/ public/test/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
